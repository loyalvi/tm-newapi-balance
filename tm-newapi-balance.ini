[General]
; New API 服务地址（不要以 / 结尾）
BaseUrl=https://your-newapi-domain.com
; 系统访问令牌（从「个人设置 → 账户管理 → 安全设置 → 系统访问令牌」获取）
AccessToken=your-access-token-here
; 用户 ID（管理员默认为 1）
UserID=1
; 轮询间隔（秒），最小 5 秒
PollInterval=60
; 调试模式：设为 1 后每次请求都会将原始 HTTP 响应追加写入
; <TrafficMonitor安装目录>/plugins/tm-newapi-balance.log
; 排查完毕后请改回 0
DebugLog=0
