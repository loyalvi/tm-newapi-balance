name: Build tm-newapi-balance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, Win32]

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -A ${{ matrix.arch }}

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tm-newapi-balance-${{ matrix.arch }}
          path: build/bin/Release/tm-newapi-balance.dll
